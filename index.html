<!DOCTYPE html>
<html>
<head>
    <title>Assessment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">My Site</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link">Home</a></li>
                <li class="nav-item"><a class="nav-link">About</a></li>
                <li class="nav-item"><a class="nav-link">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CARDS -->
<div class="container mt-5">
    <div class="row">

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card 1</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card 2</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card 3</div>
            </div>
        </div>

    </div>
</div>

<!-- FORM -->
<div class="container mt-5">

    <form id="form">

        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <textarea id="message" class="form-control mb-2" placeholder="Message"></textarea>

        <button class="btn btn-success">Submit</button>

    </form>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Submitted Data</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="m1"></p>
        <p id="m2"></p>
        <p id="m3"></p>
      </div>

    </div>
  </div>
</div>

<!-- BOOTSTRAP JS (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    document.getElementById("m1").innerText =
        "Name: " + document.getElementById("name").value;

    document.getElementById("m2").innerText =
        "Email: " + document.getElementById("email").value;

    document.getElementById("m3").innerText =
        "Message: " + document.getElementById("message").value;

    new bootstrap.Modal(document.getElementById("modal")).show();
});
</script>

</body>
</html>
